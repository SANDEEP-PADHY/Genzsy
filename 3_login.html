        <nav>

    <div class="form-area">
        <div class="wrapper">
            <h2>Login</h2>       
            <form>

                    <input type="password" placeholder="Password">
                    <i class="fa fa-lock"></i>
                </div>
                <div class="options">
                    <label><input type="checkbox"> Remember Me</label>
                    <a href="#">Forgot Password?</a>
                </div>
                <a href="1_Home.html">
                <h1 style="background-color: black; border-radius: 20px; text-align: center; border: 2px;">go</h1>
                </a>
            </form>
            <p>Don't have an account? <a href="#">Register</a></p>
        </div>
    </div>
